id = "algebra-groups/group"
title = "Group"
kind = "definition"
summary = "A set with an associative binary operation, identity element, and inverses."
aliases = ["group", "groups", "abstract group"]
domains = ["algebra", "group theory"]

[core]
source = "core.md"

[[core.data]]
id = "carrier"
text = "A set G."
refs = ["shared-foundations/set"]

[[core.data]]
id = "operation"
text = "A binary operation · : G × G → G."
refs = ["shared-foundations/binary-operation"]

[[core.data]]
id = "identity"
text = "An identity element e ∈ G."
refs = ["algebra-groups/group#axiom.identity"]

[[core.data]]
id = "inverse"
text = "An inverse operation sending a ∈ G to a^{-1} ∈ G."
refs = ["algebra-groups/group#axiom.inverse"]

[[core.axioms]]
id = "associativity"
text = "For all a,b,c ∈ G, (a·b)·c = a·(b·c)."

[[core.axioms]]
id = "identity"
text = "For all a ∈ G, e·a = a and a·e = a."

[[core.axioms]]
id = "inverse"
text = "For every a ∈ G, a·a^{-1} = e and a^{-1}·a = e."

