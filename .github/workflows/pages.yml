name: Build and deploy refactored Knowlpedia

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Knowlpedia system
        uses: actions/checkout@v6
        with:
          path: knowlpedia

      - name: Checkout Knowlpedia content
        uses: actions/checkout@v6
        with:
          repository: RyanPersson/knowlpedia-content
          ref: 2c31f58de4c25b3bb05fdc9a149624ffeac720c6
          path: knowlpedia-content

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: knowlpedia/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: knowlpedia/package-lock.json

      - name: Install dependencies
        working-directory: knowlpedia
        run: make deps

      - name: Run tests
        working-directory: knowlpedia
        run: make test

      - name: Build production site
        working-directory: knowlpedia
        run: make build-production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: knowlpedia/public-imported

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
